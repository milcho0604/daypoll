# 운영용 구성: Postgres + NestJS API (둘 다 맥미니 Docker에서).
# DB는 API와 같은 머신 localhost라 쿼리가 1ms 미만.
# 외부 노출은 Cloudflare Tunnel(cloudflared, 호스트 서비스)이 localhost:3001만 담당.
#
#   cp .env.prod.example .env.prod   # 값 채우기 (.env.prod 는 커밋 금지)
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build

name: whenever

services:
  postgres:
    image: postgres:16-alpine
    container_name: whenever-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-whenever}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-whenever}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # 호스트 노출 없음. 백업/유지보수는 `docker exec whenever-postgres ...` 로 충분하며,
    # 외부 표면을 줄여 사고 가능성을 낮춘다. 디버깅이 필요하면 일시적으로 ports 를 추가.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-whenever} -d ${POSTGRES_DB:-whenever}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: whenever-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # 외부 노출 표면이라 가장 강한 보안 옵션 적용.
    # - no-new-privileges: setuid/sudo 등 권한 상승 차단
    # - cap_drop ALL: 모든 Linux capability 제거 (NestJS 는 raw socket 등 불필요)
    # USER node (Dockerfile) 와 함께 runtime 권한 최소화.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      API_PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-whenever}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-whenever}
      CORS_ORIGIN: ${CORS_ORIGIN}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
    # cloudflared(호스트)가 http://localhost:3001 로 연결 → 127.0.0.1만 바인딩
    ports:
      - "127.0.0.1:3001:3001"

  # 일일 DB 백업 — 컨테이너 안 cron 으로 외장 디스크에 .sql.gz 저장.
  # macOS launchd / TCC 의존성 제거. Docker 죽으면 백업도 멈춤 (일관됨).
  backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: whenever-backup
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-whenever}
      POSTGRES_USER: ${POSTGRES_USER:-whenever}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "30 4 * * *"
      BACKUP_KEEP_DAYS: 14
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 0
    volumes:
      - /Volumes/milcho_ex/whenever-backups:/backups

  # 오래된 방 정리 — 매일 한 번 rooms 테이블에서 created_at 가 임계일 지난 행 DELETE.
  # CASCADE 로 candidates / votes / voter_picks 자동 정리.
  cleanup:
    image: postgres:16-alpine
    container_name: whenever-cleanup
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-whenever}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-whenever}
      CLEANUP_DAYS: "90"
    entrypoint:
      - /bin/sh
      - -c
      - |
        while true; do
          sleep 86400
          echo "[$$(date -Iseconds)] cleanup: days=$$CLEANUP_DAYS"
          psql -At -c "WITH d AS (DELETE FROM rooms WHERE created_at < now() - ($$CLEANUP_DAYS::int * INTERVAL '1 day') RETURNING 1) SELECT COUNT(*) AS removed FROM d" || true
        done

volumes:
  pgdata:
