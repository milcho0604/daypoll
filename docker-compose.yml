# 로컬 개발용 DB. 운영 스택(docker-compose.prod.yml, 프로젝트 moilga)과
# 프로젝트명·컨테이너명을 분리해 같은 머신에서 동시에 떠도 충돌하지 않는다.
# scripts/dev.sh 가 `-p moilga-dev` 로 이 파일만 제어한다.
name: moilga-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: moilga-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-whenever}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-whenever}
      POSTGRES_DB: ${POSTGRES_DB:-whenever}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-whenever} -d ${POSTGRES_DB:-whenever}"]
      interval: 5s
      timeout: 5s
      retries: 10
