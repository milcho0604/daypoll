services:
  postgres:
    image: postgres:16-alpine
    container_name: whenever-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-whenever}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-whenever}
      POSTGRES_DB: ${POSTGRES_DB:-whenever}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-whenever} -d ${POSTGRES_DB:-whenever}"]
      interval: 5s
      timeout: 5s
      retries: 10
