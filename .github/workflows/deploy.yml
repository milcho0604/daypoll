name: Deploy (ubuntu → Tailscale → mac mini ssh)

# 흐름: main 머지 → GitHub-hosted ubuntu runner → Tailscale 가입 →
#       맥미니에 ssh → git pull + docker-compose up -d --build → /health 검증.
#
# 맥미니 self-hosted runner 패턴이 Docker Desktop + launchd 의 keychain
# 정책에 막혀서, 클라우드 runner 가 Tailscale 로 들어와 명령만 보내는 식으로
# 변경. 클라우드 runner 는 keychain 이슈가 없다.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Tailscale up (ephemeral)
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # 첫 연결에서 알 수 없는 호스트 키 자동 수락 (Tailscale 안에서만 도달)
          printf 'StrictHostKeyChecking accept-new\nUserKnownHostsFile %s\n' "$HOME/.ssh/known_hosts" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy on mac mini
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -o ConnectTimeout=15 "$SSH_USER@$SSH_HOST" bash -s <<'EOF'
          set -euo pipefail
          cd /Volumes/milcho_ex/project/whenever
          git pull --ff-only
          docker-compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
          EOF

      - name: Verify health
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          for i in $(seq 1 30); do
            if ssh "$SSH_USER@$SSH_HOST" 'curl -fsS http://localhost:3001/health >/dev/null'; then
              echo "api healthy"
              exit 0
            fi
            sleep 2
          done
          echo "api did not become healthy in 60s" >&2
          ssh "$SSH_USER@$SSH_HOST" 'docker-compose -f /Volumes/milcho_ex/project/whenever/docker-compose.prod.yml logs --tail 50 api' >&2
          exit 1
